# Default system properties included when running spark-submit.
# This is useful for setting default environmental settings.

# Example:
# spark.master                     spark://master:7077

# ============================================
# EVENT LOG & HISTORY
# ============================================
spark.eventLog.enabled            true
spark.eventLog.dir                hdfs://spark-master:9000/spark-logs

spark.history.provider            org.apache.spark.deploy.history.FsHistoryProvider
spark.history.fs.logDirectory     hdfs://spark-master:9000/spark-logs
spark.history.fs.update.interval  10s
spark.history.ui.port             18080
spark.history.kerberos.keytab     none
spark.history.ui.bindHost         0.0.0.0


# ============================================
# SERIALIZATION
# ============================================

# FINAL KRYO CONFIG — THE ONE THAT WORKS
spark.serializer                        org.apache.spark.serializer.KryoSerializer
spark.kryo.unsafe                       false
spark.kryo.referenceTracking            false
spark.kryo.registrationRequired         false
spark.kryo.registrator                  com.example.udf.MyKryoRegistrator

# THESE 4 LINES ARE THE MAGIC — NEVER REMOVE ANY

spark.driver.extraJavaOptions          \
    --add-opens=java.base/java.lang.invoke=ALL-UNNAMED \
    --add-opens=java.base/java.util=ALL-UNNAMED \
    --add-opens=java.base/java.nio=ALL-UNNAMED \
    --add-opens=java.base/sun.nio.ch=ALL-UNNAMED \
    --add-opens=java.base/java.lang=ALL-UNNAMED

spark.executor.extraJavaOptions        \
    --add-opens=java.base/java.lang.invoke=ALL-UNNAMED \
    --add-opens=java.base/java.util=ALL-UNNAMED \
    --add-opens=java.base/java.nio=ALL-UNNAMED \
    --add-opens=java.base/sun.nio.ch=ALL-UNNAMED \
    --add-opens=java.base/java.lang=ALL-UNNAMED

# Desabilita tudo que pode gerar lambda internamente
spark.sql.execution.arrow.pyspark.enabled       false

# Optional but clean
spark.ui.enabled                        true        # removes the ConcurrentModificationException bug
spark.sql.adaptive.enabled              false
# Prevents Spark from auto-redirecting UI requests through YARN proxy (causes redirect loop)
spark.ui.proxyBase


# spark.driver.memory              5g
# spark.executor.extraJavaOptions  -XX:+PrintGCDetails -Dkey=value -Dnumbers="one two three"

# spark.driver.memory                40g
# spark.executer.memory              40g
# spark.driver.maxResultSize         20g


# ============================================
# HDFS CONFIGURATION
# ============================================
spark.hadoop.fs.defaultFS                hdfs://spark-master:9000
spark.hadoop.dfs.client.use.datanode.hostname    true
# Staging/conf files only need 1 replica — jobs survive losing 1 or 2 datanodes
spark.hadoop.dfs.replication             1

# ============================================
# HIVE CONFIGURATION
# ============================================
spark.sql.catalogImplementation          hive
spark.hadoop.hive.metastore.uris         thrift://hive-server:9083
spark.sql.warehouse.dir                  hdfs://spark-master:9000/user/hive/warehouse
#spark.hadoop.hive.conf.dir               /tmp/hive-conf
# Bypass metastore partition registry — discover partitions from HDFS at query time.
# Avoids listPartitions Thrift calls returning huge payloads for large tables,
# which caused executor heartbeat timeouts on Pi nodes (3+ MB task serialization).
spark.sql.hive.manageFilesourcePartitions        false
spark.sql.hive.filesourcePartitionFileCacheSize  209715200

# ============================================
# DELTA LAKE CONFIGURATION
# ============================================
spark.sql.extensions                     io.delta.sql.DeltaSparkSessionExtension
spark.sql.catalog.spark_catalog          org.apache.spark.sql.delta.catalog.DeltaCatalog

# ============================================
# YARN CONFIGURATION
# ============================================
spark.master                     yarn
# Isso deve ser menor que o parametro yarn.nodemanager.resource.memory-mb (no arquivo yarn-site.xml)
spark.yarn.am.memory             256m
spark.yarn.jars                  hdfs://spark-master:9000/shared-libs/*


# ============================================
# MEMORY CONFIGURATION
# ============================================
spark.driver.memory              512m
spark.executor.memory            512m
spark.executor.cores             1
spark.executor.instances         1

# Opções: cluster ou client
spark.submit.deployMode          client
spark.driver.bindAddress         0.0.0.0