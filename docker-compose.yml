version: "3.7"
services:
  spark-master:
    image: ubuntu-pi-03.local:5000/spark-hadoop-cluster:latest
    container_name: spark-master
    hostname: spark-master
    tty: true
    volumes:
      - /home/ubuntu/projects:/user_data
      - /media/data/hadoop/namenode:/hadoop_data/dfs/name          # ← NameNode only
      - /media/data/hadoop/datanode:/hadoop_data/dfs/data         # ← DataNode only (for testing, not recommended for production)
      - /media/shared-jars:/shared-jars
      - /media/data/hadoop/logs/namenode:/hadoop_data/logs
      - etl_data:/glustervol1
      - /home/ubuntu/.ssh:/home/appuser/.ssh:ro
    ports:
      - "8088:8088" # ResourceManager
      - "8032:8032"   # ✅ ADD THIS - ResourceManager RPC
      - "8030:8030"   # ✅ ADD THIS - ResourceManager Scheduler
      - "8031:8031"   # ✅ ADD THIS - ResourceManager Resource Tracker
      - "9870:9870" # NameNode WebUI
      - "10015:10015" # HDFS
      - "9000:9000"   # ✅ ADD THIS - HDFS NameNode RPC
      - "8080:8080" # WebUI Spark Master
      - "18080:18080" # History WebUI Spark Master
      - "8042:8042" # NodeManager
      - "4040:4040" # Spark
    networks:
      cluster-network:
        ipv4_address: 10.5.0.2
        aliases:
          - spark-master
    environment:
      - "SPARK_LOCAL_IP=spark-master"
      - HDFS_CONF_dfs_client_use_datanode_hostname=true
      - HDFS_CONF_dfs_datanode_use_datanode_hostname=true
      - HDFS_CONF_dfs_namenode_use_datanode_hostname=true
    deploy:
      placement:
        constraints:
          - node.labels.workerid == 3
    extra_hosts:
      - "spark:10.5.0.2"
    security_opt:
      - no-new-privileges:false
    privileged: true
  spark-worker-1:
    image: ubuntu-pi-03.local:5000/spark-hadoop-cluster:latest
    container_name: spark-worker-1
    hostname: spark-worker-1
    tty: true
    volumes:
      - /media/data/hadoop/datanode:/hadoop_data/dfs/data          # ← LOCAL disk on THIS Pi
      - /media/shared-jars:/shared-jars
      - /media/data/hadoop/logs/worker1:/hadoop_data/logs
      - etl_data:/glustervol1
      - /home/ubuntu/.ssh:/home/appuser/.ssh:ro
    depends_on:
      - spark-master
    ports:
      - "8081:8081" # WebUI Spark worker
      - "6042:8042" # NodeManager
      - "4041:4040" # Spark
    environment:
      - "SPARK_LOCAL_IP=spark-worker-1"
      - "SPARK_WORKER_WEBUI_PORT=8081"
      - HDFS_CONF_dfs_client_use_datanode_hostname=true
      - HDFS_CONF_dfs_datanode_use_datanode_hostname=true
      - HDFS_CONF_dfs_namenode_use_datanode_hostname=true
    networks:
      cluster-network:
        ipv4_address: 10.5.0.3
        aliases:
          - spark-worker-1
    deploy:
      placement:
        constraints:
          - node.labels.workerid == 2
    security_opt:
      - no-new-privileges:false
    privileged: true
  spark-worker-2:
    image: ubuntu-pi-03.local:5000/spark-hadoop-cluster:latest
    container_name: spark-worker-2
    hostname: spark-worker-2
    tty: true
    volumes:
      - /media/data/hadoop/datanode:/hadoop_data/dfs/data          # ← LOCAL disk on THIS Pi
      - /media/shared-jars:/shared-jars
      - /media/data/hadoop/logs/worker2:/hadoop_data/logs
      - etl_data:/glustervol1
      - /home/ubuntu/.ssh:/home/appuser/.ssh:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
    depends_on:
      - spark-master
    ports:
      - "8082:8081" # WebUI Spark worker
      - "7042:8042" # NodeManager
      - "4042:4040" # Spark
    environment:
      - "SPARK_LOCAL_IP=spark-worker-2"
      - "SPARK_WORKER_WEBUI_PORT=8081"
      - "HADOOP_OPTS=-XX:+IgnoreUnrecognizedVMOptions -XX:-UseContainerSupport --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED   --add-opens=java.base/java.io=ALL-UNNAMED  --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED   --add-opens=java.base/sun.nio.ch=ALL-UNNAMED   --add-opens=java.base/java.util=ALL-UNNAMED   --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED"
      - "YARN_OPTS=-XX:+IgnoreUnrecognizedVMOptions -XX:-UseContainerSupport --add-opens=java.base/java.lang=ALL-UNNAMED --add-opens=java.base/java.lang.reflect=ALL-UNNAMED   --add-opens=java.base/java.io=ALL-UNNAMED  --add-opens=java.base/java.net=ALL-UNNAMED --add-opens=java.base/java.nio=ALL-UNNAMED   --add-opens=java.base/sun.nio.ch=ALL-UNNAMED   --add-opens=java.base/java.util=ALL-UNNAMED   --add-opens=java.security.jgss/sun.security.krb5=ALL-UNNAMED"
      - HDFS_CONF_dfs_client_use_datanode_hostname=true
      - HDFS_CONF_dfs_datanode_use_datanode_hostname=true
      - HDFS_CONF_dfs_namenode_use_datanode_hostname=true
    networks:
      cluster-network:
        ipv4_address: 10.5.0.4
        aliases:
          - spark-worker-2
    deploy:
      placement:
        constraints: [node.role == manager]
    security_opt:
      - no-new-privileges:false
    privileged: true
  spark-worker-3:
    image: ubuntu-pi-03.local:5000/spark-hadoop-cluster:latest
    container_name: spark-worker-3
    hostname: spark-worker-3
    tty: true
    volumes:
      - /media/data/hadoop/datanode:/hadoop_data/dfs/data          # ← LOCAL disk on THIS Pi
      - /media/shared-jars:/shared-jars
      - /media/data/hadoop/logs/worker3:/hadoop_data/logs
      - etl_data:/glustervol1
      - /home/ubuntu/.ssh:/home/appuser/.ssh:ro
    depends_on:
      - spark-master
    ports:
      - "8083:8081" # WebUI Spark worker
      - "5042:8042" # NodeManager
      - "4043:4040" # Spark
    environment:
      - "SPARK_LOCAL_IP=spark-worker-3"
      - "SPARK_WORKER_WEBUI_PORT=8083"
      - HDFS_CONF_dfs_client_use_datanode_hostname=true
      - HDFS_CONF_dfs_datanode_use_datanode_hostname=true
      - HDFS_CONF_dfs_namenode_use_datanode_hostname=true
    networks:
      cluster-network:
        ipv4_address: 10.5.0.5
        aliases:
          - spark-worker-3
    deploy:
      placement:
        constraints:
          - node.labels.workerid == 1
    security_opt:
      - no-new-privileges:false
    privileged: true
  hive-server:
    image: ubuntu-pi-03.local:5000/hive:latest
    container_name: hive-server
    hostname: hive-server
    tty: true
    volumes:
      - /media/data/hadoop/hive/dump:/hadoop_data/dump
      - /media/data/hadoop/logs/hive:/usr/hive/logs
    depends_on:
      - spark-master
    ports:
      - "9083:9083"   # Hive Metastore Thrift
      - "10000:10000" # HiveServer2
    networks:
      cluster-network:
        ipv4_address: 10.5.0.6
        aliases:
          - hive-server
    deploy:
      placement:
        constraints:
          - node.labels.workerid == 2
    security_opt:
      - no-new-privileges:false
    privileged: true
  jupyter:
    image: ubuntu-pi-03.local:5000/jupyter:latest
    container_name: jupyter
    hostname: jupyter
    tty: true
    volumes:
      - /home/ubuntu/projects:/user_data
      - /media/data/hadoop/datanode:/hadoop_data/dfs/data
      - etl_data:/glustervol1
    ports:
      - "8888:8888" # Jupyter
      - "4040:4040" # Spark UI (driver)
    environment:
      - SPARK_LOCAL_IP=jupyter
      - HDFS_CONF_dfs_client_use_datanode_hostname=true
      - HDFS_CONF_dfs_datanode_use_datanode_hostname=true
      - HDFS_CONF_dfs_namenode_use_datanode_hostname=true
    networks:
      cluster-network:
        ipv4_address: 10.5.0.7
        aliases:
          - jupyter
    deploy:
      placement:
        constraints:
          - node.labels.workerid == 2
networks:
  cluster-network:
    driver: overlay
    attachable: true
    ipam:
     driver: default
     config:
       - subnet: 10.5.0.0/16
volumes:
  etl_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /media/glusterfs